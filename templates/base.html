{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AccessForge{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="topbar__inner">
                <a href="{% url 'accessforge:dashboard' %}" class="brand">
                    <span class="brand__mark">AF</span>
                    <span>
                        <strong>AccessForge</strong>
                        <small>PostgreSQL x Django 資料管理平台</small>
                    </span>
                </a>
                <nav class="topbar__nav">
                    <a href="{% url 'accessforge:dashboard' %}">儀表板</a>
                    <a href="{% url 'accessforge:table-create' %}" class="button button--small">新增資料表</a>
                    <a href="/admin/">Django Admin</a>
                </nav>
            </div>
        </header>

        <main class="content">
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message message--{{ message.tags|default:'info' }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
